<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Tezkor Taxi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MAP -->
<div id="map"></div>

<!-- UI -->
<div class="bottom-sheet glass">
  <div class="drag"></div>

  <input id="from" placeholder="📍 Qayerdan">
  <input id="to" placeholder="🏁 Qayerga">

  <div class="tariffs">
    <div class="tariff active" data-price="1">🚗 Economy</div>
    <div class="tariff" data-price="1.5">🚘 Comfort</div>
    <div class="tariff" data-price="2">🚖 Business</div>
  </div>

  <div class="price" id="price">Narx: --</div>

  <button id="orderBtn">Buyurtma berish</button>
</div>

<!-- Yandex Maps -->
<script src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_YANDEX_API_KEY&lang=ru_RU"></script>

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="script.js"></script>

</body>
</html>

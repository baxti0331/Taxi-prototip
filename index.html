<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Tezkor Taxi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Карта -->
<div id="map"></div>

<!-- Bottom Sheet Заказа -->
<div class="bottom-sheet glass">
    <div class="drag"></div>

    <input id="from" placeholder="📍 Qayerdan">
    <input id="to" placeholder="🏁 Qayerga">

    <div class="tariffs">
        <div class="tariff active" data-price="1">🚗 Economy</div>
        <div class="tariff" data-price="1.5">🚘 Comfort</div>
        <div class="tariff" data-price="2">🚖 Business</div>
    </div>

    <div class="loader"></div>
    <div class="price" id="price">Narx: --</div>

    <button id="orderBtn">Buyurtma berish</button>
</div>

<!-- Профиль -->
<div class="profile-panel glass" id="profilePanel">
    <h2>Profil</h2>
    <input id="username" placeholder="Ismingiz">
    <input id="phone" placeholder="Telefon raqam">
    <button id="saveProfile">Saqlash</button>
    <h3>Tarix buyurtmalar</h3>
    <ul id="orderHistory"></ul>
    <button id="closeProfile">Yopish</button>
</div>

<button id="openProfile" class="profile-btn">👤</button>

<script src="https://api-maps.yandex.ru/2.1/?apikey=7ebb6c44-d520-4b04-9767-085d19db6fc8&lang=ru_RU"></script>
<script src="script.js"></script>
<script src="profile.js"></script>
<script src="orders.js"></script>

</body>
</html>
